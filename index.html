<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Journey Workstation</title>
    <style>
        /* === RESET & GLOBALS === */
        * {
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
            font-family: 'Helvetica Neue', sans-serif;
            color: #2e7d32;
        }

        /* === BACKGROUND & BLUR === */
        #global_bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            filter: blur(6px);
            z-index: -1;
            transition: background-image 0.5s ease-in-out;
            background-color: transparent;
        }

        /* === TOP NAVIGATION === */
        .top-nav {
            max-width: 800px;
            margin-left: auto;
            border-radius: 40px;
            display: flex;
            justify-content: flex-end;
            padding: 10px 50px;
            backdrop-filter: blur(18px);
            margin-top: 2rem;
            position: relative;
            z-index: 10;
        }

        .nav-item {
            font-size: 25px;
            color: #2e7d32;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .nav-item:hover {
            color: #81c784;
        }

        /* === LAYOUT CONTAINERS === */
        .page {
            display: none;
            padding: 0 2rem;
            max-width: 1600px;
            margin: auto;
            animation: fadeInUp 0.6s ease-out;
        }

        .page.active {
            display: block;
        }

        .row-main {
            display: flex;
            flex-direction: row;
            gap: 4rem;
        }

        .col-left-main {
            flex: 1;
            min-width: 400px;
        }

        .col-right-main {
            flex: 1.2;
            display: flex;
            flex-direction: column;
        }

        .row-me {
            display: flex;
            flex-direction: row;
            gap: 4rem;
        }

        .col-left-me {
            flex: 1.2;
            display: flex;
            flex-direction: column;
        }

        .col-right-me {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* === TYPOGRAPHY === */
        .main-title {
            font-size: 4.5rem;
            font-weight: 700;
            line-height: 1.5;
            background: linear-gradient(135deg, #2e7d32 0%, #81c784 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            animation: fadeInUp 1s ease-out;
        }

        /* === BUTTONS === */
        button {
            cursor: pointer;
            font-family: 'Helvetica Neue', sans-serif;
        }

        .btn-primary {
            width: 160px;
            height: 48px;
            background: linear-gradient(135deg, #a5d6a7 0%, #66bb6a 100%);
            color: white;
            border: none;
            border-radius: 40px;
            padding: 10px 40px;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 20px rgba(102, 187, 106, 0.3);
            margin: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 25px rgba(102, 187, 106, 0.5);
        }

        .btn-secondary {
            background-color: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
            font-size: 45px;
            color: #2e7d32;
            font-weight: 600;
            transition: color 0.3s ease;
            position: absolute;
            right: 50px;
            top: 10px;
            z-index: 100;
        }

        .btn-secondary:hover {
            color: #81c784;
        }

        /* === FOREGROUND IMAGE === */
        .img-container {
            position: relative;
            width: 100%;
            min-height: 700px;
            margin-top: 0px;
            padding-top: 0.1px;
        }

        .foreground-magic-layer {
            position: absolute;
            z-index: 0;
            border-radius: 20px;
            opacity: 0.8;
            top: -200px;
            left: -100px;
            width: 120%;
            aspect-ratio: 1 / 1.5;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 0.5s ease-in-out;
        }

        /* === AUDIO GLASS BOX === */
        .audio-glass-box {
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(129, 199, 132, 0.2);
            animation: fadeIn 1s ease-out;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500px;
            position: relative;
            top: -140px;
            margin-top: 180px;
            width: 120%;
            left: -100px;
        }

        .playing-bars {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 40%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            height: 120px;
            gap: 12px;
            opacity: 0.9;
            z-index: 0;
        }

        .bar {
            width: 12px;
            background-color: #2e7d32;
            border-radius: 6px;
            animation: jump 1s infinite ease-in-out;
            animation-play-state: paused;
        }

        .bar:nth-child(1) {
            animation-delay: 0.1s;
        }

        .bar:nth-child(2) {
            animation-delay: 0.4s;
        }

        .bar:nth-child(3) {
            animation-delay: 0.2s;
        }

        .bar:nth-child(4) {
            animation-delay: 0.5s;
        }

        .bar:nth-child(5) {
            animation-delay: 0.3s;
        }

        .bar:nth-child(6) {
            animation-delay: 0.1s;
        }

        .bar:nth-child(7) {
            animation-delay: 0.4s;
        }

        .bar:nth-child(8) {
            animation-delay: 0.2s;
        }

        .bar:nth-child(9) {
            animation-delay: 0.5s;
        }

        .bar:nth-child(10) {
            animation-delay: 0.3s;
        }

        .bar:nth-child(11) {
            animation-delay: 0.1s;
        }

        .bar:nth-child(12) {
            animation-delay: 0.4s;
        }

        .bar:nth-child(13) {
            animation-delay: 0.2s;
        }

        .bar:nth-child(14) {
            animation-delay: 0.5s;
        }

        .bar:nth-child(15) {
            animation-delay: 0.3s;
        }

        .bar:nth-child(16) {
            animation-delay: 0.1s;
        }

        .bar:nth-child(17) {
            animation-delay: 0.4s;
        }

        .bar:nth-child(18) {
            animation-delay: 0.2s;
        }

        /* === AUDIO PLAYER === */
        .audio-wrapper {
            position: relative;
            margin-top: -100px;
            z-index: 10;
            padding: 0 20px;
            width: 120%;
            left: -100px;
            display: none;
        }

        audio {
            width: 100%;
        }

        audio::-webkit-media-controls-panel {
            background-color: rgba(24, 244, 77, 0.65) !important;
            border-radius: 20px;
        }

        /* === CUSTOM SELECT (List mode) === */
        select.glass-select {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.4);
            border-radius: 15px;
            border: 2px solid transparent;
            color: #2e7d32;
            font-weight: bold;
            padding: 10px;
            font-size: 16px;
            outline: none;
            appearance: none;
            transition: all 0.3s ease;
        }

        select.glass-select:focus,
        select.glass-select:hover {
            border: 2px solid #a5d6a7;
        }

        select.glass-select option {
            background-color: #81c784;
            color: white;
            font-weight: bold;
        }

        /* === CUSTOM AUDIO GRID DROPDOWN === */
        .audio-grid-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            max-height: 360px;
            overflow-y: auto;
            padding: 10px;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 15px;
            margin-top: 8px;
        }
        .audio-grid-panel::-webkit-scrollbar { width: 6px; }
        .audio-grid-panel::-webkit-scrollbar-thumb { background: #a5d6a7; border-radius: 3px; }
        .audio-grid-item {
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.35);
            border-radius: 10px;
            color: #2e7d32;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            text-align: center;
            transition: all 0.25s ease;
            border: 2px solid transparent;
            word-break: break-all;
        }
        .audio-grid-item:hover {
            background: rgba(165, 214, 167, 0.5);
            border-color: #66bb6a;
            transform: translateY(-2px);
        }
        .audio-grid-item.active {
            background: linear-gradient(135deg, #a5d6a7, #66bb6a);
            color: white;
            border-color: #4caf50;
        }

        /* === ME PAGE FORM STYLES === */
        textarea.glass-textarea {
            position: relative;
            width: 120%;
            height: 750px;
            background-color: rgba(255, 255, 255, 0.05);
            color: #2e7d32;
            animation: slideInLeft 0.6s ease-out;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            transition: all 0.3s ease;
            padding: 20px;
            font-size: 16px;
            font-weight: 500;
            line-height: 1.6;
            resize: none;
            margin-bottom: 20px;
            left: -150px;
            outline: none;
        }

        textarea.glass-textarea:focus {
            border-color: rgba(165, 214, 167, 0.8);
            box-shadow: 0 0 15px rgba(165, 214, 167, 0.2);
        }

        textarea.glass-textarea::placeholder {
            color: rgba(46, 125, 50, 0.5);
        }

        .form-label {
            color: #2e7d32;
            font-size: 16px;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
            margin-top: 15px;
        }

        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #4caf50;
            cursor: pointer;
            margin-top: -6px;
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.2);
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: rgba(165, 214, 167, 0.5);
            border-radius: 4px;
        }

        /* Toggle Checkbox switch mimicking st.toggle scale(3) */
        .toggle-switch-wrapper {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
            transform: scale(1.5);
            margin: 20px 0 20px 15px;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider-round {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.4);
            transition: .4s;
            border-radius: 34px;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .slider-round:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 3px;
            background-color: #2e7d32;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider-round {
            background-color: #a5d6a7;
        }

        input:checked+.slider-round:before {
            transform: translateX(26px);
            background-color: white;
        }

        /* Layout Grid */
        .btn-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
        }

        .form-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-grid-4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 10px;
            align-items: flex-start;
            justify-items: center;
            text-align: center;
        }

        /* Overlay Spinners/Toast */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: rgba(255, 255, 255, 0.8);
            color: #2e7d32;
            text-align: center;
            border-radius: 20px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 30px;
            font-weight: bold;
            transform: translateX(-50%);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            opacity: 0;
            transition: opacity 0.3s;
        }

        #toast.show {
            visibility: visible;
            opacity: 1;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes slideInLeft {
            0% {
                transform: translateX(-50px);
                opacity: 0;
            }

            100% {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes jump {

            0%,
            100% {
                height: 20px;
            }

            50% {
                height: 120px;
            }
        }
    </style>
</head>

<body>

    <button class="btn-secondary" id="page-toggle-btn" onclick="togglePage()">me</button>

    <!-- MAIN PAGE -->

                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>

                            <div class="bar"></div>

    <!-- ME PAGE (CONFIG) -->
    <div id="page-me" class="page">
        <br><br><br>
        <div class="row-me">
            <div class="col-left-me">
                <textarea id="my_glass_textarea" class="glass-textarea" placeholder="这是一个圆角矩形："></textarea>
                <div style="display: flex; gap: 20px; position: relative; left: -150px; width: 120%;">
                    <button class="btn-primary" style="flex: 1;" onclick="submitSynth()">合成</button>
                    <button class="btn-primary" style="flex: 1;" onclick="nextBg()">背景图片</button>

            <div class="col-right-me">
                <h4 style='color: #2e7d32; margin-top: 0; font-size: 24px;'>参数设置</h4>

                <label class="form-label">文本语言</label>
                <select id="p_lang" class="glass-select" style="margin-bottom: 10px;">

                        <input type="range" id="p_batch" min="1" max="8" value="1"

    <script>
        // ==================== JS CONTROLLERS ====================
        // Assume hosted on the same origin or modify API_BASE if testing externally
        const API_BASE = "http://127.0.0.1:8000";
        let bgList = [];
        let fgList = [];
        let bgIndex = 0;
        let fgIndex = 0;

        // On Mount
        window.onload = async () => {
            try {
                const r = await fetch(`${API_BASE}/api/init_data`);
                const data = await r.json();
                bgList = data.bg_list || [];
                fgList = data.fg_list || [];
                applyBg();
                applyFg();
            } catch (e) {
                showToast("无法连接到后端加载图片数据");
            }
        };

        function formatUrl(path) {
            if (path.startsWith("http")) return path;
            // Encode windows paths correctly for query parameter routing
            return `${API_BASE}/api/file?path=${encodeURIComponent(path)}`;
        }

        // Visual Changers
        function applyBg() {
            if (bgList.length > 0) {
                document.getElementById("global_bg").style.backgroundImage = `url("${formatUrl(bgList[bgIndex])}")`;
            }
        }
        function applyFg() {
            if (fgList.length > 0) {
                document.getElementById("fg_layer").style.backgroundImage = `url("${formatUrl(fgList[fgIndex])}")`;
            }
        }
        function nextBg() {
            if (bgList.length > 0) {
                bgIndex = (bgIndex + 1) % bgList.length;
                applyBg();
            }
        }
        function nextFg() {
            if (fgList.length > 0) {
                fgIndex = (fgIndex + 1) % fgList.length;
                applyFg();
            }
        }

        // Router
        function togglePage() {
            const btn = document.getElementById("page-toggle-btn");
            const mMain = document.getElementById("page-main");
            const mMe = document.getElementById("page-me");
            if (btn.innerText === "me") {
                mMain.classList.remove("active");
                mMe.classList.add("active");
                btn.innerText = "main";
            } else {
                mMe.classList.remove("active");
                mMain.classList.add("active");
                btn.innerText = "me";
            }
        }

        // List Mode Handling
        let isListVisible = false;
        let selectedAudioFile = "";
        async function toggleAudioList() {
            isListVisible = !isListVisible;
            const panel = document.getElementById("audio_list_panel");
            if (isListVisible) {
                panel.style.display = "block";
                try {
                    const r = await fetch(`${API_BASE}/api/audio_list`);
                    const data = await r.json();
                    const grid = document.getElementById("audio_grid");
                    grid.innerHTML = "";
                    data.audios.forEach(fn => {
                        const item = document.createElement("div");
                        item.className = "audio-grid-item";
                        item.textContent = fn;
                        item.onclick = () => selectAudioItem(fn, item);
                        grid.appendChild(item);
                    });
                } catch (e) {
                    showToast("拉取录音列表失败");
                }
            } else {
                panel.style.display = "none";
                selectedAudioFile = "";
                onAudioSelected();
            }
        }

        function selectAudioItem(fn, el) {
            document.querySelectorAll(".audio-grid-item").forEach(i => i.classList.remove("active"));
            el.classList.add("active");
            selectedAudioFile = fn;
            onAudioSelected();
        }

        function onAudioSelected() {
            const fn = selectedAudioFile;
            const aGlass = document.getElementById("audio_glass_panel");
            const aWrap = document.getElementById("audio_wrapper");
            const audioEl = document.getElementById("main_audio");

            if (fn && fn !== "") {
                aGlass.style.display = "flex";
                aWrap.style.display = "block";
                document.getElementById("audio_file_label").innerText = `当前文件: ${fn}`;
                // Proxy audio file stream via api/file route
                audioEl.src = `${API_BASE}/api/file?path=${encodeURIComponent("E:\\pycode\\otp\\" + fn)}`;
                audioEl.play().catch(e => console.log("Auto-play prevented"));
            } else {
                aGlass.style.display = "none";
                aWrap.style.display = "none";
                audioEl.pause();
            }
        }

        // Animations Sync Tracker
        const audioTag = document.getElementById("main_audio");
        const bars = document.querySelectorAll(".bar");
        function updateBars() {
            bars.forEach(bar => {
                bar.style.animationPlayState = audioTag.paused ? 'paused' : 'running';
            });
        }
        audioTag.addEventListener("play", updateBars);
        audioTag.addEventListener("pause", updateBars);
        audioTag.addEventListener("ended", updateBars);

        // Background Batch Exec
        async function reqBat(type) {
            showToast("指令发出中...");
            try {
                const r = await fetch(`${API_BASE}/api/run_bat?bat_type=${type}`, { method: 'POST' });
                const res = await r.json();
                showToast(res.msg || res.error);
            } catch (e) { showToast("请求执行失败，可能是Server未启动"); }
        }

        // Synthesis Construction
        async function submitSynth() {
            const text = document.getElementById("my_glass_textarea").value;
            if (!text) { showToast("木有文字(>_<)"); return; }

            showToast("打包装车中...");
            const payload = {
                sovits_payload: {
                    "text": text,
                    "text_lang": document.getElementById("p_lang").value,
                    "ref_audio_path": "D:\\GPT-SoVITS-v2pro-20250604-nvidia50\\参考音频\\先否定一些不可行的方案，会让即将提出要施行的计划变得更有分量，这可是教令院因论派中非常主流的观点。.wav",
                    "prompt_text": "先否定一些不可行的方案，会让即将提出要施行的计划变得更有分量，这可是教令院因论派中非常主流的观点。",
                    "prompt_lang": "zh",
                    "top_k": parseInt(document.getElementById("p_top_k").value),
                    "top_p": parseFloat(document.getElementById("p_top_p").value),
                    "temperature": parseFloat(document.getElementById("p_temp").value),
                    "text_split_method": document.getElementById("p_split").value,
                    "batch_size": parseInt(document.getElementById("p_batch").value),
                    "batch_threshold": parseFloat(document.getElementById("p_bthresh").value),
                    "split_bucket": document.getElementById("p_buck").checked,
                    "speed_factor": parseFloat(document.getElementById("p_speed").value),
                    "fragment_interval": parseFloat(document.getElementById("p_frag").value),
                    "seed": 99998 - parseInt(document.getElementById("p_seed").value),
                    "parallel_infer": document.getElementById("p_par").checked,
                    "repetition_penalty": parseFloat(document.getElementById("p_rep").value),
                    "sample_steps": parseInt(document.getElementById("p_steps").value),
                    "super_sampling": document.getElementById("p_sup").checked,
                    "streaming_mode": document.getElementById("p_str").checked,
                    "overlap_length": parseInt(document.getElementById("p_over").value),
                    "min_chunk_length": parseInt(document.getElementById("p_chunk").value)
                },
                if_music: document.getElementById("p_bgm").value
            };

            try {
                const r = await fetch(`${API_BASE}/api/synth`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const res = await r.json();
                showToast(res.msg || res.error);
            } catch (e) {
                showToast("连接 API 出错啦，请检查命令行");
            }
        }

        // User Feedback Utils
        function showToast(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg;
            t.className = "show";
            setTimeout(function () { t.className = t.className.replace("show", ""); }, 3000);
        }
    </script>
</body>

</html>
